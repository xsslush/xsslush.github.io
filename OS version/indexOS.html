<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lushOS</title>
</head>
<body>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-size: 16px;
            overflow: hidden;
            font-family: 'Times New Roman', Times, serif;
            background-color: rgb(255, 255, 204);
            background-image: url(/imgs/adventure-time-desktop2.jpg);
            background-size: cover;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
        .profile-card {
            border: 1px solid;
            width: fit-content;
            border-radius: 12px;
            padding: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            backdrop-filter: blur(5px);
        }
        #profile-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #ff0000;
            object-fit: cover;
        }
        .task-bar {
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            padding: 10px;
            justify-content: space-between;
            gap: 32px;
            position: absolute;
            backdrop-filter: blur(10px);
            background-color: rgba(0, 0, 0, 0.25);
            color: #fff;
        }

        .task-bar p {
            margin-left: 16px;
            background-color: rgba(256, 256, 256, 0.25);
            padding: 4px 12px;
            border-radius: 16px;
        }
        #welcomeheader {
            width: 100%;
            display: flex;
            align-items: center;
            cursor: move;
            justify-content: center;
            margin-top: 8px;
            margin: 0px;
            color: black;
            font-weight: 500;
        }
    </style>

    <div class="task-bar">
        <p>lush0S</p>
        <p id="timeElement">10:19 PM</p>
    </div>
    
    <div class="profile-card" id="welcome">
        <p id="welcomeheader">Welcome</p>
        <img src="/imgs/profilepic1.jpg" alt="cool gif" id="profile-icon">
        <div class="profile-header">
            <h1>Ana Sarah</h1>
            <p>welcome to my OS</p>
        </div>
    </div>
    
</body>
<script src="script.js"></script>
</html>
